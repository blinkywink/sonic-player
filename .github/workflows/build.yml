name: Build Sonic desktop apps

on:
  push:
    tags:
      - "v*"

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Build and package macOS app (no publish)
        run: |
          npm run build
          node scripts/prepare-mac-app.cjs
          npx electron-builder --mac --publish never
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: sonic-mac
          path: dist/Sonic-*-arm64.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Build and package Windows app (no publish)
        run: npx electron-builder --win --x64 --publish never
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: sonic-windows
          path: dist/Sonic-*-Setup.exe

