<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sonic</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/icon.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      /* Default theme; app overwrites from Settings (theme color) */
      :root {
        --app-bg: #0a0f1a;
        --app-surface: #111827;
        --app-border: #1e293b;
        --app-muted: #9ca8b8;
        --app-text: #e8eef4;
        --app-accent: #3b82f6;
        --app-accent-dim: rgba(59, 130, 246, 0.28);
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--app-bg);
        color: var(--app-text);
        font-family: var(--app-font, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
        -webkit-user-select: none;
        user-select: none;
        -webkit-user-drag: none;
      }
      img {
        -webkit-user-drag: none;
      }
      .hide-scrollbar {
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
      /* Player range inputs: no thumb by default, show thumb on hover */
      .player-range {
        -webkit-appearance: none;
        appearance: none;
        background: transparent;
      }
      .player-range::-webkit-slider-runnable-track {
        height: 6px;
        border-radius: 3px;
        background: transparent;
      }
      .player-range::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--app-text);
        cursor: pointer;
        margin-top: -4px;
        opacity: 0;
        transition: opacity 0.15s ease;
      }
      .player-range:hover::-webkit-slider-thumb,
      .player-range:focus::-webkit-slider-thumb,
      .player-range:active::-webkit-slider-thumb {
        opacity: 1;
      }
      .player-range::-moz-range-track {
        height: 6px;
        border-radius: 3px;
        background: transparent;
      }
      .player-range::-moz-range-thumb {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--app-text);
        cursor: pointer;
        border: none;
        opacity: 0;
        transition: opacity 0.15s ease;
      }
      .player-range:hover::-moz-range-thumb,
      .player-range:focus::-moz-range-thumb,
      .player-range:active::-moz-range-thumb {
        opacity: 1;
      }
      /* EQ sliders: always visible track and thumb regardless of theme */
      .eq-range {
        accent-color: var(--app-accent);
      }
      .eq-range::-webkit-slider-runnable-track {
        background: rgba(128, 128, 128, 0.5);
      }
      .eq-range::-webkit-slider-thumb {
        background: var(--app-accent);
        opacity: 1;
        box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.2);
      }
      .eq-range::-moz-range-track {
        background: rgba(128, 128, 128, 0.5);
      }
      .eq-range::-moz-range-thumb {
        background: var(--app-accent);
        opacity: 1;
        box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.2);
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
